<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Cloud Scrapper</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./src/styles/ui.css">

  <style>
    @font-face {
      font-family: 'Tilt Warp';
      src: url('./assets/Tilt_Warp/TiltWarp-Regular-VariableFont_XROT,YROT.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #0a1628;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    #game-root {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* ── Loading Screen Overlay ──────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0b1628 0%, #162d50 100%);
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-screen .load-title {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: clamp(22px, 5vw, 48px);
      color: #ffffff;
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(59,130,246,0.5);
    }
    #loading-screen .load-subtitle {
      font-family: Arial, sans-serif;
      font-size: clamp(12px, 2.2vw, 20px);
      color: #94a3b8;
      margin-bottom: 40px;
    }
    #loading-screen .load-status {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: clamp(11px, 2vw, 18px);
      color: #e2e8f0;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #loading-screen .bar-track {
      width: min(55vw, 460px);
      height: clamp(10px, 1.6vh, 18px);
      background: #1e293b;
      border-radius: 999px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    #loading-screen .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 999px;
      transition: width 0.2s ease;
    }
    #loading-screen .load-dots {
      margin-top: 18px;
      font-size: clamp(10px, 1.4vw, 14px);
      color: #475569;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="load-title">DOLWIN & BASH</div>
    <div class="load-subtitle">Cloud Scrapper</div>
    <div class="load-status" id="load-status">PREPARING GAME ASSETS (0%)</div>
    <div class="bar-track"><div class="bar-fill" id="load-bar-fill"></div></div>
    <div class="load-dots">● ● ●</div>
  </div>

  <div id="game-root"></div>
  <div id="ui-root"></div>

  <!-- Portrait-only: shown via CSS media query when mobile/tablet goes landscape -->
  <div id="orientation-lock" aria-hidden="true">
    <div class="orientation-card">
      <span class="orientation-icon">📱</span>
      <div class="orientation-title">Rotate Your Device</div>
      <div class="orientation-subtitle">Cloud Scrapper is portrait only.<br>Please rotate your phone upright.</div>
    </div>
  </div>

  <script>
    /* ── Layer 3: Dynamic UI Scale ─────────────────────────────────────────
       Sets --ui-scale CSS variable so any HTML UI elements (future overlays,
       buttons) scale up gracefully on 4K/large monitors while staying at 1
       on mobile.                                                             */
    (function uiScaleBootstrap() {
      const DESIGN_W = 1920;
      const DESIGN_H = 1080;

      function getViewport() {
        const vv = window.visualViewport;
        const vw = Math.max(1, Math.round(vv?.width  ?? window.innerWidth));
        const vh = Math.max(1, Math.round(vv?.height ?? window.innerHeight));
        return { vw, vh };
      }

      function updateUiScale() {
        const { vw, vh } = getViewport();
        const isPortrait    = vh >= vw;
        const isSmallScreen = Math.min(vw, vh) <= 900;

        // Mobile portrait → keep mobile-tuned CSS sizes unchanged (scale = 1).
        // Desktop / large screens → upscale so UI is not tiny on 4K.
        let scale = 1;
        if (!isSmallScreen && !isPortrait) {
          scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
          scale = Math.max(1, Math.min(scale, 1.85));
        }

        document.documentElement.style.setProperty("--ui-scale", String(scale));
      }

      updateUiScale();
      window.addEventListener("resize",             updateUiScale, { passive: true });
      window.visualViewport?.addEventListener("resize", updateUiScale, { passive: true });
    })();

    /* ── Phaser loader with CDN fallback ───────────────────────────────── */
    (function bootGame() {
      const phaserSources = [
        "https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js",
        "https://unpkg.com/phaser@3.80.1/dist/phaser.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"
      ];

      function loadScript(src, type) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src   = src;
          s.type  = type || "text/javascript";
          s.onload  = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }

      async function start() {
        let loaded = false;
        for (const src of phaserSources) {
          try {
            await loadScript(src);
            loaded = true;
            break;
          } catch (e) {
            console.warn("[CloudScrapper] Phaser CDN failed:", src);
          }
        }

        if (!loaded || typeof window.Phaser === "undefined") {
          console.error("[CloudScrapper] Could not load Phaser from any source.");
          return;
        }

        await loadScript("./src/main.js", "module");
      }

      start();
    })();
  </script>

</body>
</html>
